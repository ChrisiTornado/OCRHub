services:
  frontend:
    container_name: dms-frontend
    build:
      context: ./dms-frontend
      dockerfile: Dockerfile
    expose:
      - "4200"

  nginx:
    container_name: nginx
    image: nginx:stable-alpine
    expose:
      - "80"
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx.middle.conf:/etc/nginx/conf.d/default.conf:rw
    restart: unless-stopped

  backend:
    build:
      context: ./dms-backend
      dockerfile: ./Dockerfile
    container_name: dms-backend
    depends_on:
      elasticsearch:
        condition: service_healthy
      rabbitmq:
        condition: service_started
      minio:
        condition: service_started
      db:
        condition: service_healthy
    environment:
      - POSTGRES_USER=dms
      - POSTGRES_PASSWORD=dms
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/dms
      - SPRING_DATASOURCE_USERNAME=dms
      - SPRING_DATASOURCE_PASSWORD=dms
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    ports:
      - "8080:8080"

  db:
    container_name: dms-db
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dms
      POSTGRES_USER: dms
      POSTGRES_PASSWORD: dms
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U dms -d dms" ]
      interval: 5s
      retries: 20
      start_period: 10s
      timeout: 5s

  rabbitmq:
    container_name: rabbitmq
    image: rabbitmq:management
    ports:
      - "5672:5672"
      - "9093:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=dms
      - RABBITMQ_DEFAULT_PASS=dms

  ocr:
    container_name: ocr
    build:
      context: ./dms-ocr
      dockerfile: Dockerfile
    environment:
      - OCR_QUEUE=OCR_QUEUE
      - RESULT_QUEUE=RESULT_QUEUE
      - MINIO_URL=http://minio:9000
      - MINIO_ACCESS_KEY=dms-minio
      - MINIO_SECRET_KEY=dms-minio
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_PORT=5672
      - SPRING_RABBITMQ_USERNAME=dms
      - SPRING_RABBITMQ_PASSWORD=dms
    depends_on:
      elasticsearch:
        condition: service_healthy
      rabbitmq:
        condition: service_started
      minio:
        condition: service_started
    restart: on-failure

  minio:
    container_name: minio
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9090:9090"
    environment:
      - MINIO_ROOT_USER=dms-minio
      - MINIO_ROOT_PASSWORD=dms-minio
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9090"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.3
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false # Disable security for local testing
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: [ "CMD-SHELL", "curl --silent --fail http://localhost:9200/_cluster/health || exit 1" ]
      interval: 10s
      retries: 5
      start_period: 20s
      timeout: 5s

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.3
    container_name: kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch

volumes:
  db-data:
  minio-data:
  es-data:
