name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - sprint-7
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: dms-frontend/package-lock.json

      - name: Make Maven wrappers executable
        run: chmod +x dms-backend/mvnw dms-ocr/mvnw

      - name: Run backend tests
        working-directory: dms-backend
        run: ./mvnw test

      - name: Run OCR service tests
        working-directory: dms-ocr
        run: ./mvnw test

      - name: Build frontend
        working-directory: dms-frontend
        run: |
          npm ci
          npm run build

      - name: Validate Docker Compose configuration
        run: docker compose -f ./docker-compose.yml config

      - name: Start Docker Compose stack
        run: docker compose -f ./docker-compose.yml up -d --build db rabbitmq minio elasticsearch backend ocr frontend nginx

      - name: Wait for stack to be ready
        run: |
          check_url() {
            local name="$1"
            local url="$2"

            if curl -fsS "$url" > /tmp/"$name".out; then
              echo "$name is ready"
              return 0
            fi

            echo "$name is not ready yet"
            return 1
          }

          for i in {1..90}; do
            echo "Readiness attempt $i/90"

            es_ready=0
            backend_ready=0
            frontend_ready=0

            check_url elasticsearch http://localhost:9200/_cluster/health || es_ready=1
            check_url backend http://localhost:8080/api/v1/documents || backend_ready=1
            check_url frontend http://localhost/ || frontend_ready=1

            if [ "$es_ready" -eq 0 ] && [ "$backend_ready" -eq 0 ] && [ "$frontend_ready" -eq 0 ]; then
              echo "All services are ready"
              exit 0
            fi

            docker compose -f ./docker-compose.yml ps
            sleep 5
          done

          echo "Stack did not become ready in time"
          docker compose -f ./docker-compose.yml ps
          docker compose -f ./docker-compose.yml logs --tail=200 db rabbitmq minio elasticsearch backend ocr frontend nginx
          exit 1

      - name: Show running services
        run: docker compose -f ./docker-compose.yml ps

      - name: Stop Docker Compose stack
        if: always()
        run: docker compose -f ./docker-compose.yml down --volumes --remove-orphans
