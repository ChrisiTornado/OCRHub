name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - sprint-7
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: dms-frontend/package-lock.json

      - name: Make Maven wrappers executable
        run: chmod +x dms-backend/mvnw dms-ocr/mvnw

      - name: Run backend tests
        working-directory: dms-backend
        run: ./mvnw test

      - name: Run OCR service tests
        working-directory: dms-ocr
        run: ./mvnw test

      - name: Build frontend
        working-directory: dms-frontend
        run: |
          npm ci
          npm run build

      - name: Validate Docker Compose configuration
        run: docker compose -f ./docker-compose.yml config

      - name: Start Docker Compose stack
        run: docker compose -f ./docker-compose.yml up -d --build

      - name: Wait for stack to be ready
        run: |
          for i in {1..60}; do
            if curl -fsS http://localhost:9200/_cluster/health \
              && curl -fsS http://localhost:8080/api/v1/documents \
              && curl -fsS http://localhost/; then
              exit 0
            fi
            docker compose -f ./docker-compose.yml ps
            sleep 5
          done

          docker compose -f ./docker-compose.yml logs --tail=200
          exit 1

      - name: Show running services
        run: docker compose -f ./docker-compose.yml ps

      - name: Stop Docker Compose stack
        if: always()
        run: docker compose -f ./docker-compose.yml down --volumes --remove-orphans
